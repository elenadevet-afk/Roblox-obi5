<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Platform Quiz Game</title>

<style>

body{
margin:0;
background:#0f172a;
font-family:Arial;
overflow:hidden;
color:white;
}

#game{
position:relative;
width:100%;
height:100vh;
perspective:800px;
}

/* герой */

#hero{
position:absolute;
width:30px;
height:30px;
background:#38bdf8;
border-radius:50%;
bottom:120px;
left:40px;
z-index:5;
transition:all .6s ease;
}

/* линия */

#line{
position:absolute;
bottom:120px;
left:0;
right:0;
height:4px;
background:#334155;
}

/* платформы */

.platform{

position:absolute;
bottom:110px;
width:60px;
height:60px;

background:linear-gradient(145deg,#06b6d4,#0891b2);

transform:rotateX(60deg) rotateZ(45deg);

box-shadow:
0 10px 20px rgba(0,0,0,.5),
inset 0 2px 6px rgba(255,255,255,.3);

border-radius:6px;

}

/* вопрос */

#question{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
background:#020617;
padding:20px;
border-radius:12px;
width:320px;
text-align:center;
}

button{
margin-top:10px;
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

/* экран конца */

#endScreen{

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#020617;
padding:30px;
border-radius:20px;
width:350px;
text-align:center;
display:none;

}

textarea{
width:100%;
height:70px;
margin-top:10px;
border-radius:8px;
border:none;
padding:8px;
}

.lang{
position:absolute;
top:10px;
right:10px;
}

</style>
</head>

<body>

<div id="game">

<div class="lang">
<button onclick="setLang('ru')">RU</button>
<button onclick="setLang('en')">EN</button>
</div>

<div id="line"></div>

<div id="hero"></div>

<div id="platforms"></div>

<div id="question"></div>

<div id="endScreen">

<h2 id="endTitle">Игра завершена</h2>

<p id="scoreText"></p>

<label>Текст обратной связи:</label>

<textarea id="feedbackBox">
Молодец! Ты прошел игру!
</textarea>

<br><br>

<button onclick="restart()">Играть снова</button>

</div>

</div>

<script>

let lang="ru"

const text={
ru:{
end:"Игра завершена",
again:"Играть снова",
score:"Правильных ответов"
},
en:{
end:"Game Finished",
again:"Play Again",
score:"Correct Answers"
}
}

function setLang(l){

lang=l
showQuestion()

}

/* вопросы */

const tasks=[

{q:{ru:"2+2 ?",en:"2+2 ?"},a:["3","4","5"],c:1},
{q:{ru:"Столица Франции?",en:"Capital of France?"},a:["Paris","Rome","Berlin"],c:0},
{q:{ru:"5*2 ?",en:"5*2 ?"},a:["7","10","12"],c:1},
{q:{ru:"Солнце это?",en:"Sun is a?"},a:["Planet","Star","Moon"],c:1},
{q:{ru:"3+5 ?",en:"3+5 ?"},a:["6","7","8"],c:2},
{q:{ru:"HTML это?",en:"HTML is?"},a:["Language","Car","Food"],c:0},
{q:{ru:"CSS отвечает за?",en:"CSS controls?"},a:["Style","Sound","Video"],c:0},
{q:{ru:"JS используется для?",en:"JS used for?"},a:["Logic","Music","Images"],c:0},
{q:{ru:"10/2 ?",en:"10/2 ?"},a:["3","5","8"],c:1},
{q:{ru:"1+9 ?",en:"1+9 ?"},a:["10","11","9"],c:0},
{q:{ru:"Луна это?",en:"Moon is?"},a:["Star","Satellite","Planet"],c:1},
{q:{ru:"6+2 ?",en:"6+2 ?"},a:["7","8","9"],c:1},
{q:{ru:"7+1 ?",en:"7+1 ?"},a:["8","6","9"],c:0},
{q:{ru:"4+4 ?",en:"4+4 ?"},a:["6","7","8"],c:2}

]

let step=0
let score=0

/* создаем платформы */

const pContainer=document.getElementById("platforms")

for(let i=0;i<14;i++){

let p=document.createElement("div")
p.className="platform"

p.style.left=(100+i*80)+"px"

pContainer.appendChild(p)

}

/* вопрос */

function showQuestion(){

if(step>=tasks.length){

endGame()
return

}

let t=tasks[step]

let html="<h3>"+t.q[lang]+"</h3>"

t.a.forEach((ans,i)=>{

html+=`<button onclick="answer(${i})">${ans}</button>`

})

document.getElementById("question").innerHTML=html

}

/* ответ */

function answer(i){

if(i===tasks[step].c){

score++

step++

moveHero()

showQuestion()

}

}

/* движение героя */

function moveHero(){

const hero=document.getElementById("hero")

hero.style.left=(40+step*80)+"px"

}

/* конец */

function endGame(){

document.getElementById("question").style.display="none"

document.getElementById("endScreen").style.display="block"

document.getElementById("endTitle").innerText=text[lang].end

document.getElementById("scoreText").innerText=
text[lang].score+": "+score+" / 14"

}

/* рестарт */

function restart(){

location.reload()

}

showQuestion()

</script>

</body>
</html>
