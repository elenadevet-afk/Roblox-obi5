<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Genially Builder v11.3 - 12 Platforms</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #0f0f0f; color: white; }
        #panel { width: 380px; background: #1a1a1a; padding: 20px; overflow-y: auto; border-right: 2px solid #bc13fe; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        .card { background: #252525; padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid #bc13fe; }
        label { font-size: 11px; color: #aaa; text-transform: uppercase; font-weight: bold; display: block; margin-top: 10px; }
        input, select { width: 100%; padding: 8px; margin: 5px 0; background: #000; color: #00f7ff; border: 1px solid #333; border-radius: 6px; box-sizing: border-box; }
        #view { flex-grow: 1; padding: 20px; background: #050505; display: flex; flex-direction: column; }
        .win-view { flex-grow: 1; border: 2px solid #333; border-radius: 15px; overflow: hidden; background: #000; position: relative; }
        .btn-copy { background: #bc13fe; color: white; padding: 18px; width: 100%; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; margin-top: 20px;}
        .ed-lang-sw { display: flex; gap: 5px; margin-bottom: 20px; background: #000; padding: 5px; border-radius: 8px; border: 1px solid #333; }
        .ed-sw { flex: 1; text-align: center; padding: 5px; cursor: pointer; font-size: 11px; font-weight: bold; border-radius: 5px; color: #666; }
        .ed-sw.active { background: #bc13fe; color: white; }
        hr { border:0; border-top:1px solid #333; margin:15px 0; }
    </style>
</head>
<body>

<div id="panel">
    <div class="ed-lang-sw">
        <div id="sw-ru" class="ed-sw active" onclick="setEditorLang('ru')">РУССКИЙ</div>
        <div id="sw-en" class="ed-sw" onclick="setEditorLang('en')">ENGLISH</div>
    </div>

    <h2 id="ed-title">Editor v11.3 🧱</h2>
    
    <label id="l-hero">Герой (URL/GIF):</label>
    <input type="text" id="h-url" value="https://i.giphy.com/media/l41lTfO7KqT9B0X3W/giphy.gif" oninput="draw()">
    
    <label id="l-size" style="color: #ff007f;">Размер героя:</label>
    <input type="range" id="h-size" min="30" max="400" value="130" oninput="draw()">

    <label id="l-offset-y" style="color: #00f7ff;">Смещение по Y:</label>
    <input type="range" id="h-offset-y" min="0" max="150" value="85" oninput="draw()">

    <label id="l-offset-x" style="color: #ffea00;">Смещение по X:</label>
    <input type="range" id="h-offset-x" min="-100" max="100" value="0" oninput="draw()">

    <label id="l-pcol">Цвет платформы:</label>
    <input type="color" id="h-col" value="#bc13fe" oninput="draw()">

    <label id="l-time">Время (сек):</label>
    <input type="number" id="g-time" value="60" oninput="draw()">

    <hr>
    <label id="l-win">Текст победы:</label>
    <input type="text" id="t-win" value="МИССИЯ ВЫПОЛНЕНА!" oninput="draw()">
    
    <div id="q-list"></div>
    <button id="btn-copy" class="btn-copy" onclick="copyIt()">КОПИРОВАТЬ КОД</button>
</div>

<div id="view"><div id="f-box" class="win-view"></div></div>

<script>
    let currentLang = 'ru';
    const translations = {
        ru: { title:"Редактор v11.3", hero:"Герой (URL):", size:"Размер:", offsetY:"Смещение Y:", offsetX:"Смещение X:", pcol:"Цвет:", time:"Время:", win:"Победа:", btn:"КОПИРОВАТЬ КОД", restart:"ЗАНОВО", score:"МОНЕТ:", timeout:"ВРЕМЯ ВЫШЛО!", alert:"Код v11.3 скопирован!" },
        en: { title:"Editor v11.3", hero:"Hero (URL):", size:"Size:", offsetY:"Y Offset:", offsetX:"X Offset:", pcol:"Color:", time:"Time:", win:"Victory:", btn:"COPY CODE", restart:"RESTART", score:"COINS:", timeout:"TIME IS UP!", alert:"Code v11.3 copied!" }
    };

    function setEditorLang(lang) {
        currentLang = lang;
        document.getElementById('sw-ru').classList.toggle('active', lang === 'ru');
        document.getElementById('sw-en').classList.toggle('active', lang === 'en');
        const t = translations[lang];
        document.getElementById('ed-title').innerText = t.title;
        document.getElementById('l-hero').innerText = t.hero;
        document.getElementById('l-size').innerText = t.size;
        document.getElementById('l-offset-y').innerText = t.offsetY;
        document.getElementById('l-offset-x').innerText = t.offsetX;
        document.getElementById('l-pcol').innerText = t.pcol;
        document.getElementById('l-time').innerText = t.time;
        document.getElementById('l-win').innerText = t.win;
        document.getElementById('btn-copy').innerText = t.btn;
        draw();
    }

    // Список из 10 вопросов (даст 10 прыжков + старт + финиш = 12 платформ)
    let qs = [
        {q:"Apple?", a:["Яблоко","Груша","Банан"], c:0},
        {q:"Cat?", a:["Собака","Кот","Лев"], c:1},
        {q:"Red?", a:["Синий","Красный","Зеленый"], c:1},
        {q:"One+One?", a:["1","2","3"], c:1},
        {q:"Sun?", a:["Луна","Звезда","Солнце"], c:2},
        {q:"Water?", a:["Вода","Огонь","Земля"], c:0},
        {q:"Big?", a:["Малый","Большой","Средний"], c:1},
        {q:"Mother?", a:["Папа","Мама","Брат"], c:1},
        {q:"Green?", a:["Зеленый","Желтый","Серый"], c:0},
        {q:"Friend?", a:["Враг","Друг","Сосед"], c:1}
    ];

    function render() {
        const c = document.getElementById('q-list'); c.innerHTML = '';
        qs.forEach((q, i) => {
            const d = document.createElement('div'); d.className = 'card';
            d.innerHTML = `<strong>${i+1}</strong> <input type="text" value="${q.q}" oninput="qs[${i}].q=this.value;draw()">
            <div style="display:flex;gap:4px">
                <input type="text" value="${q.a[0]}" oninput="qs[${i}].a[0]=this.value;draw()"><input type="text" value="${q.a[1]}" oninput="qs[${i}].a[1]=this.value;draw()"><input type="text" value="${q.a[2]}" oninput="qs[${i}].a[2]=this.value;draw()">
            </div>`;
            c.appendChild(d);
        });
    }

    function getCode() {
        const hero = document.getElementById('h-url').value;
        const hSize = document.getElementById('h-size').value;
        const hOffY = document.getElementById('h-offset-y').value;
        const hOffX = document.getElementById('h-offset-x').value;
        const col = document.getElementById('h-col').value;
        const gameTime = document.getElementById('g-time').value;
        const winT = document.getElementById('t-win').value;
        const t = translations[currentLang];
        const data = JSON.stringify(qs);

        return `<iframe srcdoc='<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
        body,html{margin:0;padding:0;overflow:hidden;background:transparent;height:100vh;width:100vw;font-family:sans-serif;color:#fff}
        canvas{display:block}
        #ui{position:absolute;top:15px;left:15px;z-index:10;display:flex;gap:8px}
        .b{background:rgba(0,0,0,0.5);backdrop-filter:blur(5px);padding:8px 15px;border-radius:12px;border:1px solid ${col};font-size:13px;font-weight:bold;min-width:60px;text-align:center}
        #q{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);width:340px;text-align:center;display:none;z-index:20}
        #final{position:absolute; top:75px; left:15px; width:250px; text-align:left; display:none; z-index:30; opacity:0; animation: fadeIn 1s forwards;}
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .bt{background:rgba(0,0,0,0.7);border:1px solid ${col};color:#fff;width:100%;padding:14px;margin:10px 0;border-radius:15px;cursor:pointer;font-weight:bold;transition:0.3s;font-size:15px}
        .bt:hover{background:${col};color:#000}
        #qt{font-size:32px; margin-bottom:20px; color:#fff; font-weight:bold; text-shadow: 0 4px 0 #000;}
        </style></head><body>
        <div id="ui"><div class="b" id="hp">❤️ ❤️ ❤️</div><div class="b" style="color:#ffcc00">💰 <span id="coins">0</span></div><div class="b" id="timer" style="color:#39ff14">⏳ ${gameTime}</div></div>
        <div id="q"><div id="qt"></div><div id="as"></div></div>
        <div id="final"><h2 style="color:${col};" id="f-title"></h2><div id="f-score"></div><button class="bt" onclick="location.reload()">${t.restart}</button></div>
        <canvas id="c"></canvas>
        <script>
        const img=new Image();img.src="${hero}";
        const cvs=document.getElementById("c"),ctx=cvs.getContext("2d"),tasks=${data};
        const hS=${hSize}, hOY=${hOffY}, hOX=${hOffX}, pCol="${col}";
        const pW=60, pH=30, pD=15;
        let cur=0,liv=3,jT=1,sP={x:0,y:0},tP={x:0,y:0},isWin=false,isDead=false,winAn=0,jumpCount=0,fallY=0,deadAn=0,coins=0,timeLeft=${gameTime},timerId;

        function playSound(type) {
            const ac = new (window.AudioContext || window.webkitAudioContext)();
            const o = ac.createOscillator(); const g = ac.createGain();
            o.type=type==="fail"?"sawtooth":"sine"; o.frequency.setValueAtTime(type==="fail"?100:600, ac.currentTime);
            g.gain.setValueAtTime(0.1, ac.currentTime); o.connect(g); g.connect(ac.destination); o.start(); o.stop(ac.currentTime + 0.2);
        }

        function startTimer() { timerId = setInterval(()=>{ if(isWin || isDead) return; timeLeft--; document.getElementById("timer").innerText = "⏳ "+timeLeft; if(timeLeft<=0) showF(false, "${t.timeout}"); },1000); }
        function shadeColor(c, p) {
            var f=parseInt(c.slice(1),16),t=p<0?0:255,r=f>>16,g=f>>8&0xff,b=f&0xff;
            return "#"+(0x1000000+(Math.round((t-r)*Math.abs(p)+r))*0x10000+(Math.round((t-g)*Math.abs(p)+g))*0x100+(Math.round((t-b)*Math.abs(p)+b))).toString(16).slice(1);
        }

        function rs(){cvs.width=window.innerWidth;cvs.height=window.innerHeight} rs(); window.onresize=rs;
        const pls=[];for(let i=0;i<tasks.length+2;i++){pls.push({x:40+(i*65),y:cvs.height-100-(i*35), hC: i>0 && i<=tasks.length})}
        let hP={x:pls[0].x,y:pls[0].y};

        function dP(x,y,act,i){
            ctx.save(); ctx.translate(x,y);
            const tc=act?pCol:"#555", sc=shadeColor(tc,-0.3), fc=shadeColor(tc,-0.5);
            ctx.fillStyle=sc; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,pD); ctx.lineTo(pW/2,pH/2+pD); ctx.lineTo(pW/2,pH/2); ctx.fill();
            ctx.fillStyle=fc; ctx.beginPath(); ctx.moveTo(pW,0); ctx.lineTo(pW,pD); ctx.lineTo(pW/2,pH/2+pD); ctx.lineTo(pW/2,pH/2); ctx.fill();
            ctx.fillStyle=tc; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(pW/2,-pH/2); ctx.lineTo(pW,0); ctx.lineTo(pW/2,pH/2); ctx.fill();
            if(pls[i].hC && i > cur){
                ctx.fillStyle="#ffcc00"; ctx.beginPath(); ctx.arc(pW/2, -45+Math.sin(Date.now()/200)*5, 8, 0, 7); ctx.fill();
            }
            ctx.restore();
        }

        function u(){
            ctx.clearRect(0,0,cvs.width,cvs.height);
            pls.forEach((p,i)=>dP(p.x,p.y,i<=cur,i));
            let jO = Math.sin(jT*Math.PI)*50;
            if(isWin && jumpCount < 3) { winAn += 0.15; jO = Math.abs(Math.sin(winAn))*40; if(winAn >= Math.PI) { winAn -= Math.PI; jumpCount++; } }
            if(isDead) { deadAn += 0.08; if(deadAn < Math.PI) jO = Math.sin(deadAn) * 60; else { fallY += 10; jO = -fallY; } }
            if(jT<1 && !isDead){ jT+=0.04; hP.x=sP.x+(tP.x-sP.x)*jT; hP.y=sP.y+(tP.y-sP.y)*jT; if(jT>=1){jT=1; if(pls[cur].hC) { coins+=10; document.getElementById("coins").innerText=coins; playSound("coin"); } if(cur<tasks.length) uQ(); else showF(true);}}
            if(img.complete) ctx.drawImage(img, hP.x + pW/2 - hS/2 + parseInt(hOX), hP.y - hS - jO + parseInt(hOY), hS, hS);
            requestAnimationFrame(u);
        }

        function uQ(){ 
            document.getElementById("q").style.display="block"; document.getElementById("qt").innerText=tasks[cur].q; 
            const b=document.getElementById("as"); b.innerHTML=""; 
            tasks[cur].a.forEach((t,i)=>{ 
                const btn=document.createElement("button"); btn.className="bt"; btn.innerText=t; 
                btn.onclick=()=>{ if(i===tasks[cur].c){ playSound("jump"); document.getElementById("q").style.display="none"; sP={x:hP.x,y:hP.y}; cur++; tP={x:pls[cur].x,y:pls[cur].y}; jT=0; } else { liv--; document.getElementById("hp").innerText="❤️ ".repeat(Math.max(0,liv)); if(liv<=0) showF(false); } }; b.appendChild(btn); 
            }); 
        }

        function showF(win, msg){ 
            clearInterval(timerId); isWin=win; if(!win) isDead=true; 
            document.getElementById("q").style.display="none"; document.getElementById("final").style.display="block"; 
            document.getElementById("f-title").innerText=msg || (win?"${winT}":"ИГРА ОКОНЧЕНА");
            document.getElementById("f-score").innerHTML = "<h3>${t.score} "+coins+"</h3>";
            if(!win) playSound("fail");
        }
        uQ();u();startTimer();<\/script></body></html>' style='width:100%;height:600px;border:none;'></iframe>`;
    }

    function draw() { document.getElementById('f-box').innerHTML = getCode(); }
    function copyIt() {
        const el = document.createElement('textarea'); el.value = getCode();
        document.body.appendChild(el); el.select(); document.execCommand('copy');
        document.body.removeChild(el); alert(translations[currentLang].alert);
    }
    render(); draw();
</script>
</body>
</html>
