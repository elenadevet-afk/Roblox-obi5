<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Genially Game Builder v8.0</title>

<style>
body{
font-family:sans-serif;
margin:0;
display:flex;
height:100vh;
background:#111;
color:white
}

#panel{
width:350px;
background:#1a1a1a;
padding:20px;
overflow-y:auto;
border-right:2px solid #bc13fe
}

.card{
background:#252525;
padding:10px;
border-radius:8px;
margin-bottom:10px;
border-left:4px solid #bc13fe
}

input{
width:100%;
padding:8px;
margin:5px 0;
background:#000;
color:#00f7ff;
border:1px solid #444;
border-radius:4px
}

#view{
flex-grow:1;
padding:20px;
background:#000;
display:flex;
flex-direction:column
}

.win{
flex-grow:1;
border:1px solid #333;
border-radius:10px;
overflow:hidden;
background:#050505
}

.btn-copy{
background:#bc13fe;
color:white;
padding:15px;
width:100%;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
font-size:16px
}
</style>
</head>

<body>

<div id="panel">

<h2>Editor v8.0</h2>

<label>Ссылка на героя (PNG)</label>
<input type="text" id="h-url"
value="https://cdn-icons-png.flaticon.com/512/616/616430.png"
oninput="draw()">

<label>Цвет героя</label>
<input type="color" id="h-col"
value="#bc13fe"
oninput="draw()">

<div id="q-list"></div>

<button class="btn-copy" onclick="copyIt()">
КОПИРОВАТЬ ДЛЯ GENIALLY
</button>

</div>

<div id="view">

<h3>Live Preview</h3>
<div id="f-box" class="win"></div>

</div>

<script>

let qs=[

{q:"Apple?",a:["Яблоко","Груша","Банан"],c:0},
{q:"Cat?",a:["Собака","Кот","Лев"],c:1},
{q:"Red?",a:["Синий","Красный","Зеленый"],c:1},
{q:"One+One?",a:["1","2","3"],c:1},
{q:"Sun?",a:["Луна","Звезда","Солнце"],c:2},
{q:"Water?",a:["Вода","Огонь","Земля"],c:0},
{q:"Big?",a:["Малый","Большой","Средний"],c:1},
{q:"Mother?",a:["Папа","Мама","Брат"],c:1},
{q:"Green?",a:["Зеленый","Желтый","Серый"],c:0},
{q:"Friend?",a:["Враг","Друг","Сосед"],c:1},
{q:"Jump?",a:["Бег","Прыжок","Сон"],c:1},
{q:"Book?",a:["Книга","Ручка","Лист"],c:0},
{q:"Dog?",a:["Кот","Собака","Волк"],c:1},
{q:"Sky?",a:["Земля","Небо","Трава"],c:1}

];

function render(){

const c=document.getElementById("q-list")
c.innerHTML=""

qs.forEach((q,i)=>{

const d=document.createElement("div")
d.className="card"

d.innerHTML=`
<input type="text"
value="${q.q}"
oninput="qs[${i}].q=this.value;draw()">

<div style="display:flex;gap:2px">

<input type="text"
value="${q.a[0]}"
oninput="qs[${i}].a[0]=this.value;draw()">

<input type="text"
value="${q.a[1]}"
oninput="qs[${i}].a[1]=this.value;draw()">

<input type="text"
value="${q.a[2]}"
oninput="qs[${i}].a[2]=this.value;draw()">

</div>
`

c.appendChild(d)

})

}

function getCode(){

const hero=document.getElementById("h-url").value
const col=document.getElementById("h-col").value
const data=JSON.stringify(qs)

return `<iframe srcdoc='

<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<style>

body,html{
margin:0;
padding:0;
overflow:hidden;
height:100vh;
width:100vw;
font-family:sans-serif;
background:transparent
}

canvas{
display:block
}

#ui{
position:absolute;
top:10px;
left:10px;
z-index:10;
display:flex;
gap:5px
}

.b{
background:rgba(0,0,0,0.7);
color:#fff;
padding:5px 10px;
border-radius:10px;
border:1px solid ${col};
font-size:12px
}

#q{
position:absolute;
top:30%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(15,15,15,0.95);
border:2px solid ${col};
border-radius:20px;
padding:20px;
width:260px;
color:#fff;
text-align:center;
display:none;
z-index:20
}

.bt{
background:rgba(255,255,255,0.1);
border:1px solid ${col};
color:#fff;
width:100%;
padding:10px;
margin:5px 0;
border-radius:10px;
cursor:pointer;
font-weight:bold
}

#end{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(10,10,10,0.95);
border:2px solid ${col};
border-radius:20px;
padding:30px;
width:300px;
text-align:center;
display:none;
z-index:30;
color:white
}

</style>

</head>

<body>

<div id="ui">

<div class="b" id="hp">❤️ ❤️ ❤️</div>
<div class="b" id="st">STEP 1/14</div>

</div>

<div id="q">

<div id="qt"
style="font-size:18px;margin-bottom:15px"></div>

<div id="as"></div>

</div>

<div id="end">

<div style="font-size:24px;margin-bottom:10px">
🎉 Игра завершена
</div>

<div id="score"
style="margin-bottom:20px;font-size:18px"></div>

<button onclick="location.reload()"
style="
background:${col};
border:none;
color:white;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
font-weight:bold">
Играть снова
</button>

</div>

<canvas id="c"></canvas>

<script>

const img=new Image()
img.src="${hero}"

const cvs=document.getElementById("c")
const ctx=cvs.getContext("2d")

const tasks=${data}

let cur=0
let liv=3
let score=0

let jT=1
let sP={x:0,y:0}
let tP={x:0,y:0}

function rs(){
cvs.width=window.innerWidth
cvs.height=window.innerHeight
}

window.onresize=rs
rs()

const pls=[]

for(let i=0;i<15;i++){
pls.push({
x:20+(i*55),
y:cvs.height-60-(i*25)
})
}

let hP={x:pls[0].x,y:pls[0].y}

function dP(x,y,a){

ctx.save()
ctx.translate(x,y)

ctx.fillStyle=a?"${col}":"rgba(80,80,80,0.3)"

ctx.beginPath()
ctx.moveTo(0,0)
ctx.lineTo(25,-12)
ctx.lineTo(50,0)
ctx.lineTo(25,12)
ctx.closePath()

ctx.fill()
ctx.restore()

}

function dH(x,y,t){

const b=Math.sin(t*Math.PI)*40

if(img.complete)
ctx.drawImage(img,x,y-b-55,50,60)

}

function endGame(){

document.getElementById("score").innerText=
"Правильных ответов: "+score+" / "+tasks.length

document.getElementById("end").style.display="block"

}

function u(){

ctx.clearRect(0,0,cvs.width,cvs.height)

pls.forEach((p,i)=>dP(p.x,p.y,i<=cur))

if(jT<1){

jT+=0.05

hP.x=sP.x+(tP.x-sP.x)*jT
hP.y=sP.y+(tP.y-sP.y)*jT

if(jT>=1){

jT=1

if(cur<tasks.length)
uQ()
else
endGame()

}

}

dH(hP.x,hP.y,jT)

requestAnimationFrame(u)

}

function uQ(){

document.getElementById("st").innerText=
"STEP "+(cur+1)+"/"+tasks.length

document.getElementById("q").style.display="block"

document.getElementById("qt").innerText=tasks[cur].q

const b=document.getElementById("as")
b.innerHTML=""

tasks[cur].a.forEach((t,i)=>{

const btn=document.createElement("button")
btn.className="bt"
btn.innerText=t

btn.onclick=()=>{

if(i===tasks[cur].c){

score++

document.getElementById("q").style.display="none"

sP={x:hP.x,y:hP.y}

cur++

tP={x:pls[cur].x,y:pls[cur].y}

jT=0

}else{

liv--

document.getElementById("hp").innerText=
"❤️ ".repeat(liv)

if(liv<=0)
location.reload()

}

}

b.appendChild(btn)

})

}

uQ()
u()

<\/script>

</body>
</html>

' style="width:100%;height:600px;border:none;"></iframe>`

}

function draw(){
document.getElementById("f-box").innerHTML=getCode()
}

function copyIt(){

const el=document.createElement("textarea")
el.value=getCode()

document.body.appendChild(el)

el.select()
document.execCommand("copy")

document.body.removeChild(el)

alert("Код скопирован!")

}

render()
draw()

</script>

</body>
</html>
