<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Genially Builder v11.6 - Bubble Pop Edition</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #0f0f0f; color: white; }
        #panel { width: 400px; background: #1a1a1a; padding: 20px; overflow-y: auto; border-right: 2px solid #bc13fe; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        .card { background: #252525; padding: 12px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #bc13fe; }
        label { font-size: 11px; color: #aaa; text-transform: uppercase; font-weight: bold; display: block; margin-top: 10px; }
        input { width: 100%; padding: 8px; margin: 5px 0; background: #000; color: #00f7ff; border: 1px solid #333; border-radius: 6px; box-sizing: border-box; }
        .correct-label { color: #39ff14; font-size: 10px; margin-top: 5px; display: block; }
        #view { flex-grow: 1; padding: 20px; background: #050505; display: flex; flex-direction: column; }
        .win-view { flex-grow: 1; border: 2px solid #333; border-radius: 15px; overflow: hidden; background: #000; position: relative; }
        .btn-copy { background: #bc13fe; color: white; padding: 18px; width: 100%; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; margin-top: 20px;}
        .lang-tabs { display: flex; gap: 5px; margin-bottom: 20px; background: #000; padding: 5px; border-radius: 8px; }
        .lang-btn { flex: 1; padding: 6px; text-align: center; cursor: pointer; font-size: 11px; font-weight: bold; border-radius: 4px; color: #666; transition: 0.3s; }
        .lang-btn.active { background: #bc13fe; color: white; }
    </style>
</head>
<body>

<div id="panel">
    <div class="lang-tabs">
        <div id="tab-ru" class="lang-btn active" onclick="switchLang('ru')">РУССКИЙ</div>
        <div id="tab-en" class="lang-btn" onclick="switchLang('en')">ENGLISH</div>
    </div>

    <h2 id="ui-title">Editor v11.6 🛡️</h2>
    
    <label>Герой (URL/GIF):</label>
    <input type="text" id="h-url" value="https://i.giphy.com/media/l41lTfO7KqT9B0X3W/giphy.gif" oninput="draw()">
    
    <label style="color: #ff007f;">Размер человечка:</label>
    <input type="range" id="h-size" min="30" max="400" value="120" oninput="draw()">

    <label style="color: #00f7ff;">Компенсация по Y:</label>
    <input type="range" id="h-offset" min="0" max="150" value="75" oninput="draw()">

    <label>Цвет платформы:</label>
    <input type="color" id="h-col" value="#bc13fe" oninput="draw()">

    <label style="color: #ffea00;">Цвет текста вопроса:</label>
    <input type="color" id="t-col" value="#ffffff" oninput="draw()">

    <label>Время на игру (сек):</label>
    <input type="number" id="g-time" value="60" oninput="draw()">

    <label>Текст при победе:</label>
    <input type="text" id="t-win" value="МИССИЯ ВЫПОЛНЕНА!" oninput="draw()">

    <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
    
    <div id="q-list"></div>
    <button id="ui-btn-copy" class="btn-copy" onclick="copyIt()">КОПИРОВАТЬ КОД ДЛЯ GENIALLY</button>
</div>

<div id="view">
    <div id="f-box" class="win-view"></div>
</div>

<script>
    let currentLang = 'ru';
    const uiStrings = {
        ru: { restart: "ЗАНОВО", score: "МОНЕТ", gameOver: "ИГРА ОКОНЧЕНА", timeOut: "ВРЕМЯ ВЫШЛО!", shield: "ЩИТ АКТИВЕН", alert: "Код v11.6 скопирован!" },
        en: { restart: "RESTART", score: "COINS", gameOver: "GAME OVER", timeOut: "TIME IS UP!", shield: "SHIELD ACTIVE", alert: "Code v11.6 copied!" }
    };

    function switchLang(lang) {
        currentLang = lang;
        document.getElementById('tab-ru').classList.toggle('active', lang === 'ru');
        document.getElementById('tab-en').classList.toggle('active', lang === 'en');
        draw();
    }

    let qs = Array.from({length: 12}, (_, i) => ({
        q: `Предложение ${i+1}?`,
        a: ["Верный ответ", "Ложный 1", "Ложный 2"],
        c: 0
    }));

    function render() {
        const c = document.getElementById('q-list'); c.innerHTML = '';
        qs.forEach((q, i) => {
            const d = document.createElement('div'); d.className = 'card';
            d.innerHTML = `
                <strong>${i+1}</strong> <input type="text" value="${q.q.replace(/"/g, '&quot;')}" oninput="qs[${i}].q=this.value;draw()">
                <label class="correct-label">ПРАВИЛЬНЫЙ:</label>
                <input type="text" value="${q.a[0].replace(/"/g, '&quot;')}" oninput="qs[${i}].a[0]=this.value;draw()">
                <label>ЛОЖНЫЕ:</label>
                <input type="text" value="${q.a[1].replace(/"/g, '&quot;')}" oninput="qs[${i}].a[1]=this.value;draw()">
                <input type="text" value="${q.a[2].replace(/"/g, '&quot;')}" oninput="qs[${i}].a[2]=this.value;draw()">
            `;
            c.appendChild(d);
        });
    }

    function getCode() {
        const hero = document.getElementById('h-url').value;
        const hSize = document.getElementById('h-size').value;
        const hOffset = document.getElementById('h-offset').value;
        const col = document.getElementById('h-col').value;
        const tCol = document.getElementById('t-col').value;
        const gameTime = document.getElementById('g-time').value;
        const winT = document.getElementById('t-win').value;
        const s = uiStrings[currentLang];
        
        const dataPayload = btoa(unescape(encodeURIComponent(JSON.stringify(qs))));

        return `<iframe srcdoc='<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
        body,html{margin:0;padding:0;overflow:hidden;background:transparent;height:100vh;width:100vw;font-family:sans-serif;color:#fff}
        canvas{display:block}
        #ui{position:absolute;top:15px;left:15px;z-index:10;display:flex;gap:8px}
        .b{background:rgba(0,0,0,0.5);backdrop-filter:blur(5px);padding:8px 15px;border-radius:12px;border:1px solid ${col};font-size:13px;font-weight:bold;min-width:60px;text-align:center}
        #q{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);width:85%;max-width:500px;text-align:center;display:none;z-index:20}
        .bt{background:rgba(0,0,0,0.8);border:2px solid ${col};color:#fff;width:100%;padding:14px;margin:8px 0;border-radius:15px;cursor:pointer;font-weight:bold;transition:0.3s;font-size:16px;line-height:1.2;display:block}
        .bt:hover{background:${col};color:#000}
        #qt{font-size:28px; margin-bottom:20px; color:${tCol}; font-weight:bold; text-shadow: 0 4px 8px #000;}
        #final{position:absolute; top:75px; left:15px; width:260px; text-align:left; display:none; z-index:30; animation: fadeIn 0.8s forwards;}
        @keyframes fadeIn { from{opacity:0; transform:translateY(-20px);} to{opacity:1; transform:translateY(0);} }
        @keyframes shake { 0%{transform:translate(2px,2px);} 20%{transform:translate(-2px,0);} 40%{transform:translate(2px,2px);} 60%{transform:translate(-2px,1px);} 80%{transform:translate(2px,1px);} 100%{transform:translate(0,0);} }
        #shield-indicator{display:none; color:#00f7ff; text-shadow: 0 0 10px #00f7ff;}
        </style></head><body>
        <div id="ui">
            <div class="b" id="hp">❤️ ❤️ ❤️</div>
            <div class="b" id="shield-indicator">🛡️ ${s.shield}</div>
            <div class="b" style="color:#ffcc00">💰 <span id="coins">0</span></div>
            <div class="b" id="timer" style="color:#39ff14">⏳ ${gameTime}</div>
        </div>
        <div id="q"><div id="qt"></div><div id="as"></div></div>
        <div id="final"><h2 style="color:${col};" id="f-title"></h2><div id="f-score"></div><button class="bt" onclick="location.reload()">${s.restart}</button></div>
        <canvas id="c"></canvas>
        <script>
        const img=new Image();img.src="${hero}";
        const cvs=document.getElementById("c"),ctx=cvs.getContext("2d");
        const tasks = JSON.parse(decodeURIComponent(escape(atob("${dataPayload}")))).sort(() => Math.random() - 0.5);
        
        function initAudio() { if (!window.audioCtx) window.audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (window.audioCtx.state === "suspended") window.audioCtx.resume(); }
        function playS(t) {
            initAudio(); const o = window.audioCtx.createOscillator(), g = window.audioCtx.createGain();
            if(t==="jump"){ 
                o.type="sine"; 
                o.frequency.setValueAtTime(150, window.audioCtx.currentTime); 
                o.frequency.exponentialRampToValueAtTime(600, window.audioCtx.currentTime + 0.05); 
                g.gain.setValueAtTime(0.3, window.audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, window.audioCtx.currentTime + 0.1);
            }
            if(t==="coin"){ o.type="sine"; o.frequency.setValueAtTime(800, window.audioCtx.currentTime); o.frequency.exponentialRampToValueAtTime(1200, window.audioCtx.currentTime + 0.1); g.gain.setValueAtTime(0.1, window.audioCtx.currentTime); }
            if(t==="shield"){ o.type="square"; o.frequency.setValueAtTime(600, window.audioCtx.currentTime); o.frequency.exponentialRampToValueAtTime(1000, window.audioCtx.currentTime + 0.2); g.gain.setValueAtTime(0.1, window.audioCtx.currentTime); }
            if(t==="fail"){ o.type="sawtooth"; o.frequency.setValueAtTime(200, window.audioCtx.currentTime); o.frequency.linearRampToValueAtTime(50, window.audioCtx.currentTime + 0.4); g.gain.setValueAtTime(0.1, window.audioCtx.currentTime); }
            if(t==="win"){ o.type="triangle"; [523, 659, 783, 1046].forEach((f, i) => o.frequency.setValueAtTime(f, window.audioCtx.currentTime + i * 0.1)); g.gain.setValueAtTime(0.1, window.audioCtx.currentTime); }
            o.connect(g); g.connect(window.audioCtx.destination); o.start(); o.stop(window.audioCtx.currentTime + 0.5);
        }

        const hSize=${hSize}, hOffset=${hOffset}, pCol="${col}";
        let cur=0,liv=3,jT=1,sP={x:0,y:0},tP={x:0,y:0},isWin=false,isDead=false,coins=0,timeLeft=${gameTime},timerId,hasShield=false,fallY=0,deadAn=0,winAn=0,jumpCount=0;
        
        function shadeColor(color, percent) {
            var f=parseInt(color.slice(1),16),t=percent<0?0:255,p=percent<0?percent*-1:percent,R=f>>16,G=f>>8&0x00FF,B=f&0x0000FF;
            return "#"+(0x1000000+(Math.round((t-R)*p)+R)*0x10000+(Math.round((t-G)*p)+G)*0x100+(Math.round((t-B)*p)+B)).toString(16).slice(1);
        }
        function rs(){cvs.width=window.innerWidth;cvs.height=window.innerHeight}window.onresize=rs;rs();
        const stepX = 85, stepY = 15, pW = 65, pH = 30, pDepth = 15; 
        const pls=[];for(let i=0;i<(tasks.length+1);i++){
            pls.push({x:40+(i*stepX), y:cvs.height-180-(i*stepY), hasCoin: i>0, hasShield: (i===4 || i===8)})
        }
        let hP={x:pls[0].x,y:pls[0].y};
        
        function dP(x,y,active,i){
            ctx.save(); ctx.translate(x,y);
            const topC = active?pCol:"rgba(80,80,80,0.3)", sideC = active?shadeColor(pCol,-0.3):"rgba(50,50,50,0.3)", frontC = active?shadeColor(pCol,-0.5):"rgba(30,30,30,0.3)";
            ctx.fillStyle=sideC; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,pDepth); ctx.lineTo(pW/2,pH/2+pDepth); ctx.lineTo(pW/2,pH/2); ctx.fill();
            ctx.fillStyle=frontC; ctx.beginPath(); ctx.moveTo(pW,0); ctx.lineTo(pW,pDepth); ctx.lineTo(pW/2,pH/2+pDepth); ctx.lineTo(pW/2,pH/2); ctx.fill();
            ctx.fillStyle=topC; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(pW/2,-pH/2); ctx.lineTo(pW,0); ctx.lineTo(pW/2,pH/2); ctx.fill();
            if(i>cur && i<pls.length){
                if(pls[i].hasShield){ ctx.font="16px Arial"; ctx.fillText("🛡️",pW/2-10,-40+Math.sin(Date.now()/200)*5); }
                else if(pls[i].hasCoin){ ctx.fillStyle="#ffcc00"; ctx.beginPath(); ctx.arc(pW/2,-45+Math.sin(Date.now()/200)*5,7,0,Math.PI*2); ctx.fill(); }
            } ctx.restore();
        }
        function u(){
            ctx.clearRect(0,0,cvs.width,cvs.height);
            pls.forEach((p,i)=>dP(p.x,p.y,i<=cur,i));
            let jO = Math.sin(jT*Math.PI)*50;
            if(isWin && jumpCount < 3) { winAn += 0.12; jO = Math.abs(Math.sin(winAn))*50; if(winAn >= Math.PI){ winAn-=Math.PI; jumpCount++; } }
            if(isDead && deadAn >= Math.PI) { fallY += 10; jO = -fallY; } else if (isDead) { deadAn += 0.08; jO = Math.sin(deadAn) * 60; }
            if(jT<1 && !isDead){ jT+=0.04; hP.x=sP.x+(tP.x-sP.x)*jT; hP.y=sP.y+(tP.y-sP.y)*jT; if(jT>=1){jT=1; 
                if(pls[cur].hasShield) { hasShield=true; document.getElementById("shield-indicator").style.display="block"; playS("shield"); }
                else if(pls[cur].hasCoin) { coins+=10; document.getElementById("coins").innerText=coins; playS("coin"); } 
                if(cur<tasks.length) uQ(); else showF(true, "${winT}");
            }}
            if(hasShield) { ctx.save(); ctx.beginPath(); ctx.strokeStyle="#00f7ff"; ctx.lineWidth=3; ctx.arc(hP.x+pW/2, hP.y-hSize/2-jO+hOffset, hSize/1.5, 0, Math.PI*2); ctx.stroke(); ctx.restore(); }
            if(img.complete) ctx.drawImage(img, hP.x+pW/2-hSize/2, hP.y-hSize-jO+hOffset, hSize, hSize);
            requestAnimationFrame(u);
        }
        function uQ(){ 
            document.getElementById("q").style.display="block"; 
            document.getElementById("qt").innerText=tasks[cur].q; 
            const b=document.getElementById("as"); b.innerHTML=""; 
            let ans = tasks[cur].a.map((v, i) => ({v, isCorrect: i === tasks[cur].c})).sort(()=>Math.random()-0.5);
            ans.forEach((a)=>{ 
                const btn=document.createElement("button"); btn.className="bt"; btn.innerText=a.v; 
                btn.onclick=()=>{ 
                    if(a.isCorrect){ playS("jump"); document.getElementById("q").style.display="none"; sP={...hP}; cur++; tP={...pls[cur]}; jT=0; } 
                    else { if(hasShield){ hasShield=false; document.getElementById("shield-indicator").style.display="none"; playS("fail"); cvs.style.animation="shake 0.5s"; setTimeout(()=>cvs.style.animation="",500); } 
                    else { playS("fail"); liv--; document.getElementById("hp").innerText="❤️ ".repeat(Math.max(0,liv)); if(liv<=0) showF(false, "${s.gameOver}"); } }
                }; b.appendChild(btn); 
            }); 
        }
        function showF(win, msg){ clearInterval(timerId); isWin=win; if(!win) isDead=true; playS(win?"win":"fail"); document.getElementById("q").style.display="none"; document.getElementById("final").style.display="block"; document.getElementById("f-title").innerText=msg; document.getElementById("f-score").innerHTML = "<h3>${s.score}: "+coins+"</h3>"; }
        timerId = setInterval(()=>{ if(!isWin && !isDead) { timeLeft--; document.getElementById("timer").innerText = "⏳ "+timeLeft; if(timeLeft<=0) showF(false, "${s.timeOut}"); } },1000);
        uQ();u();<\/script></body></html>' style='width:100%;height:600px;border:none;'></iframe>`;
    }

    function draw() { document.getElementById('f-box').innerHTML = getCode(); }
    function copyIt() {
        const el = document.createElement('textarea'); el.value = getCode();
        document.body.appendChild(el); el.select(); document.execCommand('copy');
        document.body.removeChild(el); alert(uiStrings[currentLang].alert);
    }
    render(); draw();
</script>
</body>
</html>
