<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Genially Game Builder v10</title>

<style>

body{
font-family:sans-serif;
margin:0;
display:flex;
height:100vh;
background:#111;
color:white
}

#panel{
width:380px;
background:#1a1a1a;
padding:20px;
overflow-y:auto;
border-right:2px solid #bc13fe
}

.card{
background:#252525;
padding:10px;
border-radius:8px;
margin-bottom:10px;
border-left:4px solid #bc13fe
}

input{
width:100%;
padding:6px;
margin:3px 0;
background:#000;
color:#00f7ff;
border:1px solid #444;
border-radius:4px
}

#view{
flex-grow:1;
padding:20px;
background:#000;
display:flex;
flex-direction:column
}

.win{
flex-grow:1;
border:1px solid #333;
border-radius:10px;
overflow:hidden;
background:#050505
}

.btn-copy{
background:#bc13fe;
color:white;
padding:15px;
width:100%;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
font-size:16px
}

</style>
</head>

<body>

<div id="panel">

<h2>Game Editor v10</h2>

<label>Hero PNG</label>
<input id="h-url"
value="https://cdn-icons-png.flaticon.com/512/616/616430.png"
oninput="draw()">

<label>Color</label>
<input type="color" id="h-col" value="#bc13fe" oninput="draw()">

<h3>End Screen RU</h3>

<input id="endTitleRU" value="🎉 Игра завершена" oninput="draw()">
<input id="scoreRU" value="Правильных ответов" oninput="draw()">
<input id="againRU" value="Играть снова" oninput="draw()">

<h4>Feedback RU</h4>

<input id="fb1ru" value="Отлично 👍" oninput="draw()">
<input id="fb2ru" value="Нормально 🙂" oninput="draw()">
<input id="fb3ru" value="Сложно 👎" oninput="draw()">

<h3>End Screen EN</h3>

<input id="endTitleEN" value="🎉 Game finished" oninput="draw()">
<input id="scoreEN" value="Correct answers" oninput="draw()">
<input id="againEN" value="Play again" oninput="draw()">

<h4>Feedback EN</h4>

<input id="fb1en" value="Great 👍" oninput="draw()">
<input id="fb2en" value="Okay 🙂" oninput="draw()">
<input id="fb3en" value="Hard 👎" oninput="draw()">

<h3>Questions (RU / EN)</h3>

<div id="q-list"></div>

<button class="btn-copy" onclick="copyIt()">
COPY GAME CODE
</button>

</div>

<div id="view">

<h3>Preview</h3>
<div id="f-box" class="win"></div>

</div>

<script>

let qs=[

{
ru:{q:"Яблоко?",a:["Яблоко","Груша","Банан"]},
en:{q:"Apple?",a:["Apple","Pear","Banana"]},
c:0
},

{
ru:{q:"Кот?",a:["Собака","Кот","Лев"]},
en:{q:"Cat?",a:["Dog","Cat","Lion"]},
c:1
},

{
ru:{q:"Красный?",a:["Синий","Красный","Зеленый"]},
en:{q:"Red?",a:["Blue","Red","Green"]},
c:1
}

]

function render(){

const c=document.getElementById("q-list")
c.innerHTML=""

qs.forEach((q,i)=>{

const d=document.createElement("div")
d.className="card"

d.innerHTML=`

<b>RU</b>
<input value="${q.ru.q}"
oninput="qs[${i}].ru.q=this.value;draw()">

<input value="${q.ru.a[0]}"
oninput="qs[${i}].ru.a[0]=this.value;draw()">

<input value="${q.ru.a[1]}"
oninput="qs[${i}].ru.a[1]=this.value;draw()">

<input value="${q.ru.a[2]}"
oninput="qs[${i}].ru.a[2]=this.value;draw()">

<b>EN</b>
<input value="${q.en.q}"
oninput="qs[${i}].en.q=this.value;draw()">

<input value="${q.en.a[0]}"
oninput="qs[${i}].en.a[0]=this.value;draw()">

<input value="${q.en.a[1]}"
oninput="qs[${i}].en.a[1]=this.value;draw()">

<input value="${q.en.a[2]}"
oninput="qs[${i}].en.a[2]=this.value;draw()">

`

c.appendChild(d)

})

}

function getCode(){

const hero=document.getElementById("h-url").value
const col=document.getElementById("h-col").value

const texts={

ru:{
title:endTitleRU.value,
score:scoreRU.value,
again:againRU.value,
fb:[fb1ru.value,fb2ru.value,fb3ru.value]
},

en:{
title:endTitleEN.value,
score:scoreEN.value,
again:againEN.value,
fb:[fb1en.value,fb2en.value,fb3en.value]
}

}

return `<iframe srcdoc='

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body,html{margin:0;padding:0;overflow:hidden;height:100vh;font-family:sans-serif}

canvas{display:block}

#lang{
position:absolute;
top:10px;
right:10px;
z-index:10
}

#ui{
position:absolute;
top:10px;
left:10px;
display:flex;
gap:5px;
z-index:10
}

.b{
background:rgba(0,0,0,0.7);
color:#fff;
padding:5px 10px;
border-radius:10px;
border:1px solid ${col};
font-size:12px
}

#q{
position:absolute;
top:30%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(15,15,15,0.95);
border:2px solid ${col};
border-radius:20px;
padding:20px;
width:260px;
color:#fff;
text-align:center;
display:none;
z-index:20
}

.bt{
background:rgba(255,255,255,0.1);
border:1px solid ${col};
color:#fff;
width:100%;
padding:10px;
margin:5px 0;
border-radius:10px;
cursor:pointer;
font-weight:bold
}

#end{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(10,10,10,0.95);
border:2px solid ${col};
border-radius:20px;
padding:30px;
width:300px;
text-align:center;
display:none;
z-index:30;
color:white
}

</style>

</head>

<body>

<select id="lang">
<option value="ru">RU</option>
<option value="en">EN</option>
</select>

<div id="ui">

<div class="b" id="hp">❤️ ❤️ ❤️</div>
<div class="b" id="st">STEP</div>

</div>

<div id="q">

<div id="qt"></div>
<div id="as"></div>

</div>

<div id="end">

<div id="endTitle"></div>
<div id="score"></div>
<div id="feedback"></div>
<button id="again"></button>

</div>

<canvas id="c"></canvas>

<script>

const texts=${JSON.stringify(texts)}
const tasks=${JSON.stringify(qs)}

let lang="ru"

document.getElementById("lang").onchange=e=>{
lang=e.target.value
}

let cur=0
let liv=3
let score=0

function showQuestion(){

const q=tasks[cur][lang]

document.getElementById("q").style.display="block"
document.getElementById("qt").innerText=q.q

const a=document.getElementById("as")
a.innerHTML=""

q.a.forEach((t,i)=>{

const b=document.createElement("button")
b.className="bt"
b.innerText=t

b.onclick=()=>{

if(i===tasks[cur].c){

score++
cur++

document.getElementById("q").style.display="none"

if(cur<tasks.length)
showQuestion()
else
endGame()

}else{

liv--
document.getElementById("hp").innerText="❤️ ".repeat(liv)

if(liv<=0)
location.reload()

}

}

a.appendChild(b)

})

}

function endGame(){

const t=texts[lang]

document.getElementById("end").style.display="block"

document.getElementById("endTitle").innerText=t.title

document.getElementById("score").innerText=
t.score+": "+score+" / "+tasks.length

const fb=document.getElementById("feedback")
fb.innerHTML=""

t.fb.forEach(f=>{

const b=document.createElement("button")
b.className="bt"
b.innerText=f

b.onclick=()=>alert("Feedback: "+f)

fb.appendChild(b)

})

const again=document.getElementById("again")
again.innerText=t.again
again.onclick=()=>location.reload()

}

showQuestion()

<\/script>

</body>
</html>

' style="width:100%;height:600px;border:none;"></iframe>`

}

function draw(){
document.getElementById("f-box").innerHTML=getCode()
}

function copyIt(){

const el=document.createElement("textarea")
el.value=getCode()

document.body.appendChild(el)
el.select()

document.execCommand("copy")

document.body.removeChild(el)

alert("Game code copied!")

}

render()
draw()

</script>

</body>
</html>
