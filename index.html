<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Genially Game Editor v10.8</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #0f0f0f; color: white; }
        #panel { width: 400px; background: #1a1a1a; padding: 20px; overflow-y: auto; border-right: 2px solid #bc13fe; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        .card { background: #252525; padding: 12px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #bc13fe; }
        .card strong { color: #bc13fe; font-size: 14px; }
        label { font-size: 11px; color: #aaa; text-transform: uppercase; font-weight: bold; display: block; margin-top: 10px; }
        input[type="text"], input[type="number"] { width: 100%; padding: 8px; margin: 5px 0; background: #000; color: #00f7ff; border: 1px solid #333; border-radius: 6px; box-sizing: border-box; }
        .ans-input { border-color: #444 !important; font-size: 13px; }
        .correct-hint { color: #39ff14; font-size: 10px; font-weight: bold; margin-bottom: 2px; display: block; }
        #view { flex-grow: 1; padding: 20px; background: #050505; display: flex; flex-direction: column; }
        .win-view { flex-grow: 1; border: 2px solid #333; border-radius: 15px; overflow: hidden; background: #000; position: relative; }
        .btn-copy { background: #bc13fe; color: white; padding: 18px; width: 100%; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; margin-top: 20px;}
        .btn-copy:hover { background: #d414ff; transform: scale(1.02); }
    </style>
</head>
<body>

<div id="panel">
    <h2>Редактор игры v10.8</h2>
    <p style="font-size: 12px; color: #888;">Заполните 12 вопросов ниже. <br><b>Совет:</b> Пишите правильный ответ всегда в ПЕРВОЕ поле вопроса.</p>
    
    <label>Герой (URL/GIF):</label>
    <input type="text" id="h-url" value="https://i.giphy.com/media/l41lTfO7KqT9B0X3W/giphy.gif" oninput="draw()">
    
    <label>Время на игру (сек):</label>
    <input type="number" id="g-time" value="60" oninput="draw()">

    <label>Цвет платформы:</label>
    <input type="color" id="h-col" value="#bc13fe" style="width:100%; height:40px; background:none; border:none;" oninput="draw()">

    <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
    
    <div id="q-list"></div>
    
    <button class="btn-copy" onclick="copyIt()">КОПИРОВАТЬ КОД ДЛЯ GENIALLY</button>
</div>

<div id="view">
    <div id="f-box" class="win-view"></div>
</div>

<script>
    // Инициализация 12 вопросов. Правильный ответ всегда a[0] (c:0)
    let qs = Array.from({length: 12}, (_, i) => ({
        q: `Предложение-вопрос №${i+1}?`,
        a: ["Правильный ответ (пишите сюда)", "Ложный вариант 1", "Ложный вариант 2"],
        c: 0
    }));

    function render() {
        const c = document.getElementById('q-list'); c.innerHTML = '';
        qs.forEach((q, i) => {
            const d = document.createElement('div'); d.className = 'card';
            d.innerHTML = `
                <strong>ВОПРОС ${i+1}</strong>
                <input type="text" value="${q.q}" placeholder="Текст вопроса..." oninput="qs[${i}].q=this.value;draw()">
                
                <label class="correct-hint">ВЕРНЫЙ ОТВЕТ:</label>
                <input type="text" class="ans-input" style="border-left: 3px solid #39ff14" value="${q.a[0]}" oninput="qs[${i}].a[0]=this.value;draw()">
                
                <label>ЛОЖНЫЕ ВАРИАНТЫ:</label>
                <input type="text" class="ans-input" value="${q.a[1]}" oninput="qs[${i}].a[1]=this.value;draw()">
                <input type="text" class="ans-input" value="${q.a[2]}" oninput="qs[${i}].a[2]=this.value;draw()">
            `;
            c.appendChild(d);
        });
    }

    function getCode() {
        const hero = document.getElementById('h-url').value;
        const col = document.getElementById('h-col').value;
        const gameTime = document.getElementById('g-time').value;
        const data = JSON.stringify(qs).replace(/'/g, "\\'");

        return `<iframe srcdoc='<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
        body,html{margin:0;padding:0;overflow:hidden;background:transparent;height:100vh;width:100vw;font-family:sans-serif;color:#fff}
        canvas{display:block}
        #ui{position:absolute;top:15px;left:15px;z-index:10;display:flex;gap:8px}
        .b{background:rgba(0,0,0,0.6);backdrop-filter:blur(5px);padding:8px 15px;border-radius:12px;border:1px solid ${col};font-size:13px;font-weight:bold;min-width:60px;text-align:center}
        #q{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);width:85%;max-width:500px;text-align:center;display:none;z-index:20}
        .bt{background:rgba(0,0,0,0.85);border:2px solid ${col};color:#fff;width:100%;padding:14px;margin:8px 0;border-radius:15px;cursor:pointer;font-weight:bold;font-size:16px;line-height:1.2}
        .bt:hover{background:${col};color:#000}
        #qt{font-size:26px; margin-bottom:20px; color:#fff; font-weight:bold; text-shadow: 0 4px 8px #000;}
        #final{position:absolute;top:20%;left:50%;transform:translateX(-50%);text-align:center;display:none;z-index:30}
        </style></head><body>
        <div id="ui"><div class="b" id="hp">❤️ ❤️ ❤️</div><div class="b" style="color:#ffcc00">💰 <span id="coins">0</span></div><div class="b" id="timer" style="color:#39ff14">⏳ ${gameTime}</div></div>
        <div id="q"><div id="qt"></div><div id="as"></div></div>
        <div id="final"><h1 id="f-msg"></h1><button class="bt" onclick="location.reload()">ЗАНОВО</button></div>
        <canvas id="c"></canvas>
        <script>
        const cvs=document.getElementById("c"),ctx=cvs.getContext("2d"),img=new Image();img.src="${hero}";
        const raw=${data}, tasks=[...raw].sort(()=>Math.random()-0.5);
        let cur=0,liv=3,coins=0,timeLeft=${gameTime},isEnd=false,jT=1;
        const pCol="${col}", pW=70, pH=30, stepX=90, stepY=18;
        const pls=[];for(let i=0;i<=tasks.length;i++)pls.push({x:50+i*stepX,y:cvs.height-150-i*stepY});
        let hP={x:pls[0].x,y:pls[0].y},sP={x:0,y:0},tP={x:0,y:0};

        function rs(){cvs.width=window.innerWidth;cvs.height=window.innerHeight}window.onresize=rs;rs();
        
        function drawP(x,y,active){
            ctx.fillStyle=active?pCol:"#333";
            ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+pW/2,y-pH/2);ctx.lineTo(x+pW,y);ctx.lineTo(x+pW/2,y+pH/2);ctx.fill();
        }

        function u(){
            ctx.clearRect(0,0,cvs.width,cvs.height);
            pls.forEach((p,i)=>drawP(p.x,p.y,i<=cur));
            let jO=Math.sin(jT*Math.PI)*50;
            if(jT<1){jT+=0.04;hP.x=sP.x+(tP.x-sP.x)*jT;hP.y=sP.y+(tP.y-sP.y)*jT;if(jT>=1){jT=1;if(cur<tasks.length)showQ();else finish("ПОБЕДА!");}}
            ctx.drawImage(img,hP.x+pW/2-40,hP.y-80-jO,80,80);
            if(!isEnd)requestAnimationFrame(u);
        }

        function showQ(){
            document.getElementById("q").style.display="block";
            document.getElementById("qt").textContent=tasks[cur].q;
            const as=document.getElementById("as");as.innerHTML="";
            let aList=tasks[cur].a.map((v,i)=>({v,c:i===tasks[cur].c})).sort(()=>Math.random()-0.5);
            aList.forEach(a=>{
                const b=document.createElement("button");b.className="bt";b.textContent=a.v;
                b.onclick=()=>{
                    if(a.c){document.getElementById("q").style.display="none";sP={...hP};cur++;tP={...pls[cur]};jT=0;coins+=10;document.getElementById("coins").innerText=coins;}
                    else{liv--;document.getElementById("hp").innerText="❤️ ".repeat(liv);if(liv<=0)finish("КОНЕЦ ИГРЫ");}
                };as.appendChild(b);
            });
        }

        function finish(m){isEnd=true;document.getElementById("q").style.display="none";document.getElementById("final").style.display="block";document.getElementById("f-msg").innerText=m;}
        setInterval(()=>{if(!isEnd){timeLeft--;document.getElementById("timer").innerText="⏳ "+timeLeft;if(timeLeft<=0)finish("ВРЕМЯ ВЫШЛО");}},1000);
        showQ();u();
        <\/script></body></html>' style='width:100%;height:600px;border:none;'></iframe>`;
    }

    function draw() { document.getElementById('f-box').innerHTML = getCode(); }
    function copyIt() {
        const el = document.createElement('textarea'); el.value = getCode();
        document.body.appendChild(el); el.select(); document.execCommand('copy');
        document.body.removeChild(el); alert("Код v10.8 скопирован! Теперь вставьте его в Genially.");
    }
    render(); draw();
</script>
</body>
</html>
