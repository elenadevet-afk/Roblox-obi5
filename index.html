<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Genially Builder v10.3 - Lang Switch</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #0f0f0f; color: white; }
        #panel { width: 380px; background: #1a1a1a; padding: 20px; overflow-y: auto; border-right: 2px solid #bc13fe; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        .card { background: #252525; padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid #bc13fe; }
        label { font-size: 11px; color: #aaa; text-transform: uppercase; font-weight: bold; display: block; margin-top: 10px; }
        input { width: 100%; padding: 8px; margin: 5px 0; background: #000; color: #00f7ff; border: 1px solid #333; border-radius: 6px; box-sizing: border-box; }
        #view { flex-grow: 1; padding: 20px; background: #050505; display: flex; flex-direction: column; }
        .win-view { flex-grow: 1; border: 2px solid #333; border-radius: 15px; overflow: hidden; background: #000; position: relative; }
        .btn-copy { background: #bc13fe; color: white; padding: 18px; width: 100%; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; margin-top: 20px;}
        .lang-group { border: 1px dashed #444; padding: 10px; border-radius: 5px; margin-top: 5px; }
    </style>
</head>
<body>

<div id="panel">
    <h2>Editor v10.3 🌐</h2>
    <label>Герой (GIF):</label>
    <input type="text" id="h-url" value="https://i.giphy.com/media/l41lTfO7KqT9B0X3W/giphy.gif" oninput="draw()">
    
    <label>Цвет платформ:</label>
    <input type="color" id="h-col" value="#bc13fe" oninput="draw()">

    <div class="lang-group">
        <label style="color:#39ff14">Тексты (RU):</label>
        <input type="text" id="t-win-ru" value="ПОБЕДА!" oninput="draw()">
        <input type="text" id="t-fail-ru" value="ПРОИГРЫШ" oninput="draw()">
        <input type="text" id="t-time-ru" value="ВРЕМЯ ВЫШЛО" oninput="draw()">
    </div>

    <div class="lang-group">
        <label style="color:#00f7ff">Texts (EN):</label>
        <input type="text" id="t-win-en" value="VICTORY!" oninput="draw()">
        <input type="text" id="t-fail-en" value="GAME OVER" oninput="draw()">
        <input type="text" id="t-time-en" value="TIME OUT" oninput="draw()">
    </div>
    
    <div id="q-list"></div>
    <button class="btn-copy" onclick="copyIt()">КОПИРОВАТЬ КОД</button>
</div>

<div id="view"><div id="f-box" class="win-view"></div></div>

<script>
    // Вопросы теперь содержат две версии текста
    let qs = [
        {qr:"Яблоко?", qe:"Apple?", a:["Яблоко / Apple","Груша / Pear","Банан / Banana"], c:0},
        {qr:"Кот?", qe:"Cat?", a:["Собака / Dog","Кот / Cat","Лев / Lion"], c:1},
        {qr:"Красный?", qe:"Red?", a:["Синий / Blue","Красный / Red","Зеленый / Green"], c:1}
    ];

    function render() {
        const c = document.getElementById('q-list'); c.innerHTML = '';
        qs.forEach((q, i) => {
            const d = document.createElement('div'); d.className = 'card';
            d.innerHTML = `<strong>${i+1}</strong> 
            <input type="text" value="${q.qr}" oninput="qs[${i}].qr=this.value;draw()">
            <input type="text" value="${q.qe}" oninput="qs[${i}].qe=this.value;draw()">`;
            c.appendChild(d);
        });
    }

    function getCode() {
        const col = document.getElementById('h-col').value;
        const ruT = { win: document.getElementById('t-win-ru').value, fail: document.getElementById('t-fail-ru').value, time: document.getElementById('t-time-ru').value, coin: "МОНЕТЫ" };
        const enT = { win: document.getElementById('t-win-en').value, fail: document.getElementById('t-fail-en').value, time: document.getElementById('t-time-en').value, coin: "COINS" };

        return `<iframe srcdoc='<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
        body,html{margin:0;padding:0;overflow:hidden;background:transparent;height:100vh;font-family:sans-serif;color:#fff}
        canvas{display:block}
        #ui{position:absolute;top:15px;left:15px;z-index:10;display:flex;gap:8px}
        #lang-sw{position:absolute;top:15px;right:15px;z-index:100;display:flex;gap:5px}
        .b{background:rgba(0,0,0,0.6);backdrop-filter:blur(5px);padding:8px 12px;border-radius:10px;border:1px solid ${col};font-size:12px;font-weight:bold}
        .sw{cursor:pointer;opacity:0.6;transition:0.3s} .sw.active{opacity:1;border-color:#fff;box-shadow:0 0 10px ${col}}
        #q{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);width:340px;text-align:center;display:none;z-index:20}
        .bt{background:rgba(0,0,0,0.8);border:1px solid ${col};color:#fff;width:100%;padding:14px;margin:8px 0;border-radius:15px;cursor:pointer;font-weight:bold}
        #final{position:absolute;top:20%;left:50%;transform:translateX(-50%);text-align:center;display:none;z-index:30}
        </style></head><body>
        <div id="ui"><div class="b" id="hp">❤️ ❤️ ❤️</div><div class="b" style="color:#ffcc00">💰 <span id="cn">0</span></div><div class="b" id="tm">⏳ 60</div></div>
        <div id="lang-sw"><div class="b sw active" onclick="setL(\\"ru\\")">RU</div><div class="b sw" onclick="setL(\\"en\\")">EN</div></div>
        <div id="q"><div id="qt" style="font-size:28px;margin-bottom:20px;font-weight:bold;text-shadow:0 4px #000"></div><div id="as"></div></div>
        <div id="final"><h1 id="f-t"></h1><h2 id="f-s"></h2><button class="bt" onclick="location.reload()">RESTART</button></div>
        <canvas id="c"></canvas>
        <script>
        let lang="ru"; const tasks=${JSON.stringify(qs)}, ruT=${JSON.stringify(ruT)}, enT=${JSON.stringify(enT)};
        const cvs=document.getElementById("c"),ctx=cvs.getContext("2d");
        let cur=0,liv=3,timeLeft=60,coins=0,isWin=false,isDead=false,jT=1,sP={x:0,y:0},tP={x:0,y:0};
        const pCol="${col}", pW=60, pH=30, pDepth=15;

        function setL(l){ 
            lang=l; document.querySelectorAll(".sw").forEach(b=>b.classList.toggle("active", b.innerText.toLowerCase()===l));
            if(document.getElementById("q").style.display==="block") uQ();
        }

        let audioCtx; function playS(f){ if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)(); const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type="sine"; o.frequency.setValueAtTime(f,audioCtx.currentTime); g.gain.setValueAtTime(0.1,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.1); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+0.1); }

        function rs(){cvs.width=window.innerWidth;cvs.height=window.innerHeight} rs(); window.onresize=rs;
        const pls=[]; for(let i=0;i<tasks.length+1;i++) pls.push({x:40+(i*70),y:cvs.height-100-(i*40)});
        let hP={x:pls[0].x,y:pls[0].y};

        function dP(x,y,act,i){
            ctx.save(); ctx.translate(x,y);
            ctx.fillStyle=act?pCol:"rgba(80,80,80,0.3)";
            ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(pW/2,-pH/2); ctx.lineTo(pW,0); ctx.lineTo(pW/2,pH/2); ctx.fill();
            if(i>cur){ ctx.fillStyle="#ffcc00"; ctx.beginPath(); ctx.arc(pW/2,-40,6,0,7); ctx.fill(); }
            ctx.restore();
        }

        function u(){
            ctx.clearRect(0,0,cvs.width,cvs.height);
            pls.forEach((p,i)=>dP(p.x,p.y,i<=cur,i));
            let jO = Math.sin(jT*Math.PI)*50;
            if(jT<1){ jT+=0.04; hP.x=sP.x+(tP.x-sP.x)*jT; hP.y=sP.y+(tP.y-sP.y)*jT; if(jT>=1){jT=1; coins+=10; document.getElementById("cn").innerText=coins; if(cur<tasks.length) uQ(); else showF("win");}}
            ctx.fillStyle="#fff"; ctx.fillRect(hP.x+pW/2-10, hP.y-40-jO, 20, 40); // Заглушка героя
            requestAnimationFrame(u);
        }

        function uQ(){
            document.getElementById("q").style.display="block";
            const t=tasks[cur]; document.getElementById("qt").innerText=lang=="ru"?t.qr:t.qe;
            const b=document.getElementById("as"); b.innerHTML="";
            t.a.forEach((txt,i)=>{
                const btn=document.createElement("button"); btn.className="bt"; btn.innerText=txt;
                btn.onclick=()=>{ if(i===t.c){ playS(600); document.getElementById("q").style.display="none"; sP={x:hP.x,y:hP.y}; cur++; tP={x:pls[cur].x,y:pls[cur].y}; jT=0; } else { liv--; document.getElementById("hp").innerText="❤️ ".repeat(Math.max(0,liv)); if(liv<=0) showF("fail"); }}
                b.appendChild(btn);
            });
        }

        function showF(s){
            document.getElementById("q").style.display="none"; document.getElementById("final").style.display="block";
            const lt = lang=="ru"?ruT:enT;
            document.getElementById("f-t").innerText = s=="win"?lt.win:lt.fail;
            document.getElementById("f-s").innerText = lt.coin + ": " + coins;
        }

        setInterval(()=>{ if(!isWin && !isDead) { timeLeft--; document.getElementById("tm").innerText="⏳ "+timeLeft; if(timeLeft<=0) showF("fail"); } },1000);
        uQ(); u();
        <\/script></body></html>' style='width:100%;height:600px;border:none;'></iframe>`;
    }

    function draw() { document.getElementById('f-box').innerHTML = getCode(); }
    function copyIt() {
        const el = document.createElement('textarea'); el.value = getCode();
        document.body.appendChild(el); el.select(); document.execCommand('copy');
        document.body.removeChild(el); alert("Код v10.3 скопирован!");
    }
    render(); draw();
</script>
</body>
</html>
